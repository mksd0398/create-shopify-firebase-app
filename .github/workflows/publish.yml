name: Publish to npm

on:
  push:
    branches: [master]

jobs:
  publish:
    # Only run in the original repo — forks cannot publish
    if: github.repository == 'mksd0398/create-shopify-firebase-app'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Check if version needs publishing
        id: check
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          PUBLISHED=$(npm view create-shopify-firebase-app@$PACKAGE_VERSION version 2>/dev/null || echo "")
          if [ "$PUBLISHED" = "$PACKAGE_VERSION" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Version $PACKAGE_VERSION already published — skipping"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "Will publish version $PACKAGE_VERSION"
          fi

      - name: Publish to npm
        if: steps.check.outputs.skip != 'true'
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
